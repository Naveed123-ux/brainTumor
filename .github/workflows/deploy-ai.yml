name: AI Service CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - '**'
      - '.github/workflows/deploy-ai.yml'

jobs:
  # ─── Job 1: Build & Compile (runs on every push to main) ────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  # ─── Job 2: Docker Build & Push ─────────────────────────────────────────────
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push AI Service image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/brain-tumor-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy to VPS (runs after docker job passes) ──────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Create network if not exists
            docker network create nex-gen-network || true

            # --- 1. Deploy AI Service Container ---
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/brain-tumor-ai:latest
            docker stop brain-tumor-ai || true
            docker rm brain-tumor-ai || true
            docker run -d \
              --name brain-tumor-ai \
              --restart unless-stopped \
              --network nex-gen-network \
              -p ${{ secrets.AI_PORT || 8020 }}:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/brain-tumor-ai:latest

            # Prune unused images to save disk space
            docker image prune -f
